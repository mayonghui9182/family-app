# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api

# Spring 配置
spring:
  application:
    name: family-backend

  # 数据源配置 - H2 数据库（开发环境）
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:family_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:

  # H2 控制台（开发环境使用）
  h2:
    console:
      enabled: true
      path: /h2-console

  # Flyway 数据库迁移配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # Servlet Multipart 配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.family.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Springdoc OpenAPI 配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# JWT 配置
jwt:
  secret: family-management-system-secret-key-2024
  expire-hours: 24

# 文件上传配置
file:
  upload-path: ./uploads
  max-size: 10MB

# 日志配置
logging:
  level:
    com.family: debug
    org.springframework.web: info

# 百度语音配置
baidu:
  speech:
    app-id: your-app-id
    api-key: your-api-key
    secret-key: your-secret-key
